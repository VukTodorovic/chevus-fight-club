<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chevu's Fight Club</title>
  <link rel="stylesheet" href="/css/game.css">
</head>
<body>
  <!-- Character Select Screen -->
  <div id="select-screen" class="screen">
    <h1 class="select-title">SELECT YOUR FIGHTERS</h1>

    <div class="select-panels">
      <div class="select-panel p1-panel">
        <h2>PLAYER 1</h2>
        <div class="fighter-grid" id="p1-fighters"></div>
        <div class="selected-preview" id="p1-preview">
          <div class="preview-sprite" id="p1-preview-sprite"></div>
          <div class="preview-name" id="p1-preview-name">???</div>
        </div>
        <div class="status-indicator" id="p1-status">WAITING FOR CONTROLLER...</div>
      </div>

      <div class="vs-divider">VS</div>

      <div class="select-panel p2-panel">
        <h2>PLAYER 2</h2>
        <div class="fighter-grid" id="p2-fighters"></div>
        <div class="selected-preview" id="p2-preview">
          <div class="preview-sprite" id="p2-preview-sprite"></div>
          <div class="preview-name" id="p2-preview-name">???</div>
        </div>
        <div class="status-indicator" id="p2-status">WAITING FOR CONTROLLER...</div>
      </div>
    </div>

    <div class="map-select">
      <h2>SELECT ARENA</h2>
      <div class="map-grid" id="map-grid"></div>
    </div>

    <button class="fight-btn" id="fight-btn" disabled>FIGHT!</button>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen hidden">
    <canvas id="gameCanvas"></canvas>
    <div id="game-hud">
      <div class="hud-bar">
        <div class="player-hud p1-hud">
          <div class="player-name" id="hud-p1-name">P1</div>
          <div class="health-bar-container">
            <div class="health-bar" id="p1-health"></div>
          </div>
        </div>
        <div class="round-info">
          <div class="timer" id="timer">99</div>
          <div class="round-text" id="round-text">ROUND 1</div>
        </div>
        <div class="player-hud p2-hud">
          <div class="player-name" id="hud-p2-name">P2</div>
          <div class="health-bar-container">
            <div class="health-bar" id="p2-health"></div>
          </div>
        </div>
      </div>
      <div class="round-markers">
        <div class="markers p1-markers">
          <span class="marker" id="p1-r1"></span>
          <span class="marker" id="p1-r2"></span>
        </div>
        <div class="markers p2-markers">
          <span class="marker" id="p2-r1"></span>
          <span class="marker" id="p2-r2"></span>
        </div>
      </div>
    </div>
    <div id="announcement" class="hidden"></div>
    <button id="pause-btn" class="pause-btn">II</button>
    <div id="pause-overlay" class="overlay hidden">
      <h1>PAUSED</h1>
      <button class="overlay-btn" id="resume-btn">RESUME</button>
      <button class="overlay-btn secondary" id="pause-select-btn">FIGHTER SELECT</button>
    </div>
    <div id="match-end-overlay" class="overlay hidden">
      <h1 id="match-end-text">MATCH OVER</h1>
      <button class="overlay-btn" id="rematch-btn">REMATCH</button>
      <p class="overlay-hint">or press REMATCH on controller</p>
    </div>
  </div>

  <script src="/js/fighters.js"></script>
  <script src="/js/maps.js"></script>
  <script src="/js/engine.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
